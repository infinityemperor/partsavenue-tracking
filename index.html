<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>PartsAvenue — Трекинг контейнеров</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    header { background: #1a1a2e; color: white; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; }
    .updated { font-size: 12px; color: #6b7a90; }

    .tabs-bar { padding: 20px 28px 0; display: flex; gap: 4px; }
    .tab { padding: 9px 22px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 500; background: #dde2ea; color: #666; transition: background 0.15s; }
    .tab.active { background: white; color: #1a1a2e; font-weight: 600; }

    /* Канбан-доска */
    .board { display: flex; gap: 14px; padding: 20px 28px 40px; align-items: flex-start; overflow-x: auto; }
    .column { flex: 1 1 0; min-width: 270px; background: #e8ebf0; border-radius: 12px; padding: 12px; }
    .column-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px 12px; }
    .column-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; display: flex; align-items: center; gap: 7px; }
    .column-dot { width: 9px; height: 9px; border-radius: 50%; }
    .column-count { font-size: 12px; font-weight: 700; color: #fff; background: #b0b8c4; border-radius: 20px; padding: 1px 9px; min-width: 22px; text-align: center; }
    .col-waiting .column-dot { background: #98a0ad; } .col-waiting .column-count { background: #98a0ad; }
    .col-transit .column-dot { background: #1565c0; } .col-transit .column-count { background: #1565c0; }
    .col-arrived .column-dot { background: #4527a0; } .col-arrived .column-count { background: #4527a0; }
    .col-customs .column-dot { background: #e65100; } .col-customs .column-count { background: #e65100; }
    .col-empty { font-size: 12px; color: #aab2bd; text-align: center; padding: 18px 0; }

    /* Сетка для завершённых */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px 28px 40px; align-items: start; }

    .card { background: white; border-radius: 10px; padding: 16px; border: 1px solid #e4e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 12px; }
    .card:last-child { margin-bottom: 0; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .card-name { font-size: 18px; font-weight: 700; }

    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-waiting   { background: #f0f0f0; color: #888; }
    .badge-transit   { background: #e3f2fd; color: #1565c0; }
    .badge-arrived   { background: #ede7f6; color: #4527a0; }
    .badge-customs   { background: #fff3e0; color: #e65100; }
    .badge-delivered { background: #e8f5e9; color: #2e7d32; }

    /* Степпер */
    .stepper { display: flex; margin: 4px 0 12px; }
    .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    .step .dot { width: 14px; height: 14px; border-radius: 50%; background: #d6dae1; border: 2px solid #d6dae1; z-index: 1; }
    .step::before { content: ''; position: absolute; top: 6px; right: 50%; width: 100%; height: 2px; background: #d6dae1; z-index: 0; }
    .step:first-child::before { display: none; }
    .step.done .dot { background: #2e7d32; border-color: #2e7d32; }
    .step.done::before { background: #2e7d32; }
    .step.current .dot { background: #fff; border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,.18); }
    .step.late .dot { background: #fff; border-color: #c62828; box-shadow: 0 0 0 3px rgba(198,40,40,.15); }
    .step-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: #aab2bd; margin-top: 6px; }
    .step-date { font-size: 10px; margin-top: 2px; font-weight: 600; }
    .step-date.fact { color: #2e7d32; }
    .step-date.plan { color: #b0b8c4; }
    .step-date.late { color: #c62828; }

    .delay-tag { font-size: 12px; font-weight: 600; color: #c62828; margin-bottom: 10px; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .btn { padding: 6px 13px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-fpz { background: #e3f2fd; color: #1565c0; }
    .btn-ffz { background: #e8f5e9; color: #2e7d32; }
    .btn-toggle { background: #f5f5f5; color: #555; font-size: 12px; padding: 5px 12px; }

    /* Состав */
    .items-section { display: none; margin-top: 8px; border-top: 1px solid #eee; padding-top: 10px; }
    .items-section.open { display: block; }
    .items-header { display: flex; gap: 0; padding: 0 4px 4px; border-bottom: 1px solid #eee; margin-bottom: 2px; }
    .items-header span { font-size: 10px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.4px; }
    .items-header .h-art   { flex: 1; min-width: 0; }
    .items-header .h-brand { width: 84px; }
    .items-header .h-qty   { width: 46px; text-align: right; }
    .item-row { display: flex; align-items: center; padding: 4px 4px; border-bottom: 1px solid #f5f5f5; }
    .item-row:last-child { border-bottom: none; }
    .item-art   { flex: 1; min-width: 0; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1a1a2e; }
    .item-brand { width: 84px; font-size: 11px; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-qty   { width: 46px; font-size: 12px; font-weight: 600; text-align: right; color: #444; }

    /* Календарь приходов на склад */
    .cal-wrap { padding: 20px 28px 40px; overflow-x: auto; }
    .cal-legend { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; font-size: 12px; color: #6b7a90; }
    .cal-legend i { display: inline-block; width: 20px; height: 12px; border-radius: 3px; vertical-align: -1px; margin-right: 6px; }
    .cal { width: 100%; min-width: 860px; border-collapse: separate; border-spacing: 0; background: white; border: 1px solid #e4e8f0; border-radius: 12px; overflow: hidden; }
    .cal th { background: #eef1f6; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7a90; padding: 10px 8px; border-bottom: 1px solid #e4e8f0; }
    .cal th.h-month { width: 140px; text-align: left; padding-left: 16px; }
    .cal td { border-bottom: 1px solid #eef0f4; border-left: 1px solid #eef0f4; padding: 8px; vertical-align: top; height: 64px; width: 21.5%; }
    .cal td.cal-month { border-left: none; }
    .cal tr:last-child td { border-bottom: none; }
    .cal-month { background: #fafbfd; font-size: 13px; font-weight: 700; padding-left: 16px !important; white-space: nowrap; }
    .cal-month small { display: block; font-size: 11px; font-weight: 500; color: #aab2bd; margin-top: 3px; }
    .cal-now { background: #fffdf3; box-shadow: inset 0 0 0 2px #f2c94c; }
    .chip { display: block; border-radius: 7px; padding: 5px 9px; margin-bottom: 5px; font-size: 12px; font-weight: 700; }
    .chip:last-child { margin-bottom: 0; }
    .chip small { font-weight: 500; opacity: 0.8; margin-left: 5px; }
    .chip-fact { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .chip-plan { background: #f4f6fa; color: #5a6a80; border: 1px dashed #c3ccdb; }
    .chip-late { background: #fdecea; color: #c62828; border: 1px solid #f3c4bf; }
    .cal-nodate { margin-top: 16px; font-size: 13px; color: #8a94a6; }
    .cal-nodate .chip { display: inline-block; margin: 4px 6px 0 0; }

    .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }
  </style>
</head>
<body>

<header>
  <h1>PartsAvenue &mdash; Трекинг контейнеров</h1>
  <span class="updated" id="updated">Загрузка...</span>
</header>

<div class="tabs-bar">
  <button class="tab active" id="tab-active" onclick="showTab('active')">Активные <span id="cnt-active"></span></button>
  <button class="tab" id="tab-done" onclick="showTab('done')">Завершённые <span id="cnt-done"></span></button>
  <button class="tab" id="tab-calendar" onclick="showTab('calendar')">Календарь приходов <span id="cnt-calendar"></span></button>
</div>

<div id="view"></div>

<script>
  let all = [];
  let tab = 'active';

  // стадии канбана (по порядку движения)
  const STAGES = [
    { status: 'Ожидает отправки', title: 'Ожидает', cls: 'col-waiting' },
    { status: 'В пути',           title: 'В пути',   cls: 'col-transit' },
    { status: 'Прибыл',           title: 'Прибыл',   cls: 'col-arrived' },
    { status: 'На таможне',       title: 'На таможне', cls: 'col-customs' },
  ];

  function fmtDate(d) {
    if (!d) return null;
    const [y, m, day] = d.split('-');
    return `${day}.${m}.${y}`;
  }
  function fmtShort(d) {
    if (!d) return null;
    const [y, m, day] = d.split('-');
    return `${day}.${m}`;
  }

  function badge(status) {
    const map = {
      'Доставлен':        ['badge-delivered', '&#10003; Доставлен'],
      'На таможне':       ['badge-customs',   '&#128083; На таможне'],
      'Прибыл':           ['badge-arrived',   '&#9875; Прибыл'],
      'В пути':           ['badge-transit',   '&#128674; В пути'],
      'Ожидает отправки': ['badge-waiting',   '&#8987; Ожидает'],
    };
    const [cls, label] = map[status] || ['badge-waiting', status];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  // компактный степпер из 4 точек
  function stepper(c) {
    const steps = [
      { label: 'Отпр.',  plan: c.ship_plan,      fact: c.ship_fact,      delay: c.delays?.ship },
      { label: 'Приб.',  plan: c.arrival_plan,   fact: c.arrival_fact,   delay: c.delays?.arrival },
      { label: 'Там.',   plan: c.customs_plan,   fact: c.customs_fact,   delay: c.delays?.customs },
      { label: 'Склад',  plan: c.warehouse_plan, fact: c.warehouse_fact, delay: c.delays?.warehouse },
    ];
    // текущий шаг = первый без факта
    let current = steps.findIndex(s => !s.fact);
    return '<div class="stepper">' + steps.map((s, i) => {
      let cls = 'step';
      if (s.fact) cls += ' done';
      else if (i === current) cls += s.delay ? ' late' : ' current';
      let dateHtml, dateCls, dateTxt, title = '';
      if (s.fact) { dateCls = 'fact'; dateTxt = fmtShort(s.fact); title = 'факт: ' + fmtDate(s.fact); }
      else if (s.delay) { dateCls = 'late'; dateTxt = fmtShort(s.plan); title = 'план: ' + fmtDate(s.plan) + ' · просрочка'; }
      else if (s.plan) { dateCls = 'plan'; dateTxt = fmtShort(s.plan); title = 'план: ' + fmtDate(s.plan); }
      else { dateCls = 'plan'; dateTxt = '—'; }
      return `<div class="${cls}" title="${title}">
                <span class="dot"></span>
                <span class="step-label">${s.label}</span>
                <span class="step-date ${dateCls}">${dateTxt}</span>
              </div>`;
    }).join('') + '</div>';
  }

  function delayTag(c) {
    const d = c.delays || {};
    const map = { ship: 'отправки', arrival: 'прибытия', customs: 'таможни', warehouse: 'склада' };
    for (const k of ['ship', 'arrival', 'customs', 'warehouse']) {
      if (d[k]) return `<div class="delay-tag">&#9888; Задержка ${d[k]} дн. (ждём ${map[k]})</div>`;
    }
    return '';
  }

  function itemsSection(c) {
    if (!c.items || c.items.length === 0) return '';
    const id = 'items-' + c.name.replace('#', '');
    const rows = c.items.map(it => `
      <div class="item-row">
        <span class="item-art" title="${it.art}">${it.art}</span>
        <span class="item-brand" title="${it.brand}">${it.brand}</span>
        <span class="item-qty">${it.qty != null ? it.qty.toLocaleString('ru') : '—'}</span>
      </div>`).join('');
    return `
      <div>
        <button class="btn btn-toggle" onclick="toggleItems('${id}', this)">&#9660; Состав (${c.items.length} поз.)</button>
        <div class="items-section" id="${id}">
          <div class="items-header">
            <span class="h-art">Артикул</span>
            <span class="h-brand">Бренд</span>
            <span class="h-qty">Кол-во</span>
          </div>
          ${rows}
        </div>
      </div>`;
  }

  function toggleItems(id, btn) {
    const el = document.getElementById(id);
    const open = el.classList.toggle('open');
    btn.innerHTML = (open ? '&#9650;' : '&#9660;') + btn.innerHTML.slice(1);
  }

  function card(c) {
    const fpz = c.fpz_url ? `<a class="btn btn-fpz" href="${c.fpz_url}" download>&#128196; ФПЗ</a>` : '';
    const ffz = c.ffz_url ? `<a class="btn btn-ffz" href="${c.ffz_url}" download>&#128203; ФФЗ</a>` : '';
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-name">${c.name}</span>
          ${badge(c.status)}
        </div>
        ${stepper(c)}
        ${delayTag(c)}
        <div class="actions">${fpz}${ffz}</div>
        ${itemsSection(c)}
      </div>`;
  }

  // ── Календарь приходов на склад ────────────────────────────────────────────
  const MONTHS = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                  'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
  const QUARTERS = ['1–7', '8–14', '15–21', '22–конец'];

  // Парсим 'ГГГГ-ММ-ДД' вручную: new Date('2026-07-23') трактуется как UTC
  // и для нашего +03:00 съезжает на день назад.
  function parseISO(s) {
    if (!s) return null;
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function quarterOf(day) {
    return day <= 7 ? 0 : day <= 14 ? 1 : day <= 21 ? 2 : 3;
  }

  function renderCalendar() {
    // только активные: доставленные в календарь приходов не попадают
    const list = all.filter(c => c.status !== 'Доставлен');
    const today = new Date(); today.setHours(0, 0, 0, 0);

    const cells = {};          // 'год-месяц' -> [[], [], [], []]
    const noDate = [];
    let min = null, max = null;

    list.forEach(c => {
      // дата прихода: факт, если уже случился, иначе план
      const iso = c.warehouse_fact || c.warehouse_plan;
      const d = parseISO(iso);
      if (!d) { noDate.push(c); return; }
      const key = d.getFullYear() + '-' + d.getMonth();
      if (!cells[key]) cells[key] = [[], [], [], []];
      cells[key][quarterOf(d.getDate())].push({ c, d, iso, fact: !!c.warehouse_fact });
      if (!min || d < min) min = d;
      if (!max || d > max) max = d;
    });

    if (!list.length) {
      return '<div class="empty">Нет активных контейнеров</div>';
    }
    if (!min) {
      return '<div class="empty">У активных контейнеров не заполнена дата склада</div>';
    }

    // диапазон месяцев: от первого до последнего прихода, но текущий месяц всегда внутри
    let from = new Date(Math.min(min, today).valueOf());
    let to   = new Date(Math.max(max, today).valueOf());
    from = new Date(from.getFullYear(), from.getMonth(), 1);
    to   = new Date(to.getFullYear(), to.getMonth(), 1);

    const rows = [];
    for (let m = new Date(from); m <= to; m.setMonth(m.getMonth() + 1)) {
      const key = m.getFullYear() + '-' + m.getMonth();
      const quarters = cells[key] || [[], [], [], []];
      const total = quarters.reduce((s, q) => s + q.length, 0);
      const isNowMonth = m.getFullYear() === today.getFullYear() && m.getMonth() === today.getMonth();
      const nowQuarter = isNowMonth ? quarterOf(today.getDate()) : -1;

      const tds = quarters.map((items, qi) => {
        const chips = items
          .sort((a, b) => a.d - b.d)
          .map(({ c, d, iso, fact }) => {
            let cls = 'chip-plan', hint = 'план: ' + fmtDate(iso);
            if (fact) { cls = 'chip-fact'; hint = 'факт: ' + fmtDate(iso); }
            else if (d < today) { cls = 'chip-late'; hint = 'план: ' + fmtDate(iso) + ' · просрочен'; }
            const poz = c.items ? c.items.length : 0;
            return `<span class="chip ${cls}" title="${c.name} · ${c.status} · ${hint}${poz ? ' · ' + poz + ' поз.' : ''}">
                      ${c.name}<small>${fmtShort(iso)}</small>
                    </span>`;
          }).join('');
        return `<td class="${qi === nowQuarter ? 'cal-now' : ''}">${chips}</td>`;
      }).join('');

      rows.push(`
        <tr>
          <td class="cal-month">${MONTHS[m.getMonth()]} ${m.getFullYear()}
            <small>${total ? total + ' конт.' : '—'}</small>
          </td>
          ${tds}
        </tr>`);
    }

    const nodate = noDate.length
      ? `<div class="cal-nodate">Без даты склада:
           ${noDate.map(c => `<span class="chip chip-plan">${c.name}</span>`).join('')}</div>`
      : '';

    return `
      <div class="cal-wrap">
        <div class="cal-legend">
          <span><i class="chip-fact"></i>факт — уже на складе</span>
          <span><i class="chip-plan"></i>план</span>
          <span><i class="chip-late"></i>план просрочен</span>
          <span>Дата прихода: факт склада, если есть, иначе план</span>
        </div>
        <table class="cal">
          <tr>
            <th class="h-month">Месяц</th>
            ${QUARTERS.map(q => `<th>${q}</th>`).join('')}
          </tr>
          ${rows.join('')}
        </table>
        ${nodate}
      </div>`;
  }

  function showTab(t) {
    tab = t;
    ['active', 'done', 'calendar'].forEach(x =>
      document.getElementById('tab-' + x).classList.toggle('active', t === x));
    render();
  }

  function render() {
    const view = document.getElementById('view');
    if (tab === 'calendar') {
      view.innerHTML = renderCalendar();
      return;
    }
    if (tab === 'done') {
      const list = all.filter(c => c.status === 'Доставлен');
      view.innerHTML = `<div class="cards-grid">${
        list.length ? list.map(card).join('') : '<div class="empty">Нет завершённых контейнеров</div>'
      }</div>`;
      return;
    }
    // канбан по стадиям
    const cols = STAGES.map(stage => {
      const list = all.filter(c => c.status === stage.status);
      const cards = list.length
        ? list.map(card).join('')
        : '<div class="col-empty">пусто</div>';
      return `
        <div class="column ${stage.cls}">
          <div class="column-head">
            <span class="column-title"><span class="column-dot"></span>${stage.title}</span>
            <span class="column-count">${list.length}</span>
          </div>
          ${cards}
        </div>`;
    }).join('');
    view.innerHTML = `<div class="board">${cols}</div>`;
  }

  fetch('data.json?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.json())
    .then(data => {
      all = data.containers;
      document.getElementById('updated').textContent = 'Обновлено: ' + data.updated_at;
      document.getElementById('cnt-active').textContent = '(' + all.filter(c => c.status !== 'Доставлен').length + ')';
      document.getElementById('cnt-done').textContent   = '(' + all.filter(c => c.status === 'Доставлен').length + ')';
      document.getElementById('cnt-calendar').textContent = '(' + all.filter(c => c.status !== 'Доставлен').length + ')';
      render();
    })
    .catch(() => {
      document.getElementById('view').innerHTML = '<div class="empty">Не удалось загрузить данные</div>';
      document.getElementById('updated').textContent = 'Ошибка загрузки';
    });
</script>

</body>
</html>
